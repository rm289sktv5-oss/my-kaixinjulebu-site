<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏入口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        ::selection {
            background: #409eff;
            color: #fff;
        }
        body {
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            min-height: 100vh;
            line-height: 1.6;
            position: relative;
            overflow: hidden;
        }
        /* ========== 星光粒子飘落 ========== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat linear infinite;
            box-shadow: 0 0 4px 1px rgba(255, 255, 255, 0.2);
        }
        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translateY(0) translateX(0);
            }
            10% { opacity: 0.5; }
            90% { opacity: 0.3; }
            100% {
                opacity: 0;
                transform: translateY(100vh) translateX(80px);
            }
        }
        /* 鼠标跟随光晕 */
        .cursor-glow {
            position: fixed;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(64, 158, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            transition: transform 0.15s ease-out;
            mix-blend-mode: screen;
        }
        /* 动态背景层 */
        .game-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(55px) brightness(0.38) saturate(0.9);
            transform: scale(1.15);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            animation: bgBreath 8s ease-in-out infinite;
        }
        .game-bg.active {
            transform: scale(1);
            opacity: 1;
        }
        @keyframes bgBreath {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.03) rotate(0.3deg); }
        }
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.55) 0%, rgba(18, 18, 18, 0.7) 100%);
            pointer-events: none;
        }
        /* 边框流动光效（仅Q群提示框使用） */
        .glow-border {
            position: relative;
            overflow: hidden;
        }
        .glow-border::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent,
                rgba(64, 158, 255, 0.2),
                transparent,
                rgba(103, 194, 58, 0.2),
                transparent
            );
            animation: borderRotate 6s linear infinite;
            z-index: -1;
        }
        @keyframes borderRotate {
            100% { transform: rotate(360deg); }
        }
        .glow-border::before {
            content: '';
            position: absolute;
            inset: 1.5px;
            background: inherit;
            border-radius: inherit;
            z-index: -1;
        }
        /* 左侧栏样式 + 滚动条美化 */
        .sidebar {
            width: 320px;
            background: rgba(18, 18, 18, 0.65);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding: 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                4px 0 30px rgba(0, 0, 0, 0.3),
                inset -1px 0 0 rgba(255, 255, 255, 0.05);
            overflow-y: auto;
            position: relative;
            z-index: 10;
            animation: slideInLeft 0.8s ease-out;
            max-height: 100vh;
        }
        /* 左侧滚动条 */
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(64, 158, 255, 0.4);
            border-radius: 3px;
        }
        .sidebar::-webkit-scrollbar-thumb:hover {
            background: rgba(64, 158, 255, 0.7);
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .sidebar-header .icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #409eff, #66b1ff);
            border-radius: 6px;
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(64, 158, 255, 0.4);
        }
        .sidebar-subtitle {
            color: #888;
            margin-bottom: 20px;
            font-size: 13px;
            letter-spacing: 1px;
        }
        .game-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .game-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .game-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(64, 158, 255, 0.15), transparent);
            transition: left 0.5s ease;
        }
        .game-item:hover::before {
            left: 100%;
        }
        .game-item.active {
            background: rgba(64, 158, 255, 0.12);
            border: 1px solid rgba(64, 158, 255, 0.35);
            box-shadow: 
                0 4px 16px rgba(64, 158, 255, 0.15),
                inset 0 1px 0 rgba(64, 158, 255, 0.15);
        }
        .game-item:hover:not(.active) {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(3px);
        }
        .game-item .game-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            background-color: #444;
            flex-shrink: 0;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }
        .game-item:hover .game-icon {
            transform: scale(1.08);
        }
        .game-info {
            flex: 1;
        }
        .game-name {
            font-size: 15px;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .game-tag {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .game-tag .type {
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 11px;
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .game-tag .hot {
            background: linear-gradient(135deg, #f56c6c, #ff7875);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            color: #fff;
            box-shadow: 0 2px 6px rgba(245, 108, 108, 0.25);
            animation: hotPulse 2.5s ease-in-out infinite;
        }
        @keyframes hotPulse {
            0%, 100% { box-shadow: 0 2px 6px rgba(245, 108, 108, 0.25); }
            50% { box-shadow: 0 2px 12px rgba(245, 108, 108, 0.5); }
        }
        /* 右侧主区域样式 + 滚动条美化 */
        .main {
            flex: 1;
            padding: 40px;
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.8s ease-out 0.2s both;
            overflow-y: auto;
            max-height: 100vh;
        }
        /* 右侧滚动条 */
        .main::-webkit-scrollbar {
            width: 6px;
        }
        .main::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }
        .main::-webkit-scrollbar-thumb {
            background: rgba(64, 158, 255, 0.4);
            border-radius: 3px;
        }
        .main::-webkit-scrollbar-thumb:hover {
            background: rgba(64, 158, 255, 0.7);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px) saturate(180%);
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 14px;
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            animation: float 3.5s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .game-title {
            font-size: 52px;
            font-weight: bold;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #fff 0%, #409eff 30%, #67c23a 60%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shine 3.5s linear infinite;
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }
        .game-intro {
            max-width: 800px;
            height: 420px;
            overflow-y: auto;
            padding-right: 15px;
            line-height: 1.85;
            color: #d0d0d0;
            font-size: 15px;
            /* 切换时淡入动画 */
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }
        .game-intro.show {
            opacity: 1;
            transform: translateY(0);
        }
        .game-intro p {
            margin-bottom: 10px;
        }
        .game-intro strong {
            color: #fff;
        }
        /* 全局小型滚动条（原有保留） */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        /* 按钮区域 */
        .btn-wrap {
            margin-top: 32px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .download-btn, .reg-btn {
            padding: 13px 30px;
            color: #fff;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            outline: none;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            transform: scale(0);
            animation: rippleEffect 0.6s ease-out;
            pointer-events: none;
        }
        @keyframes rippleEffect {
            to { transform: scale(4.5); opacity: 0; }
        }
        .download-btn {
            background: linear-gradient(135deg, #409eff 0%, #66b1ff 100%);
            box-shadow: 
                0 4px 14px rgba(64, 158, 255, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 7px 22px rgba(64, 158, 255, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }
        .reg-btn {
            background: linear-gradient(135deg, #67c23a 0%, #85d85a 100%);
            box-shadow: 
                0 4px 14px rgba(103, 194, 58, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }
        .reg-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 7px 22px rgba(103, 194, 58, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }
        .btn-disabled {
            pointer-events: none;
            opacity: 0.35;
            cursor: not-allowed !important;
            box-shadow: none !important;
            transform: none !important;
            filter: grayscale(40%);
        }
        .invite-box {
            padding: 13px 22px;
            background: rgba(255, 193, 7, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 193, 7, 0.25);
            border-radius: 10px;
            color: #ffd54f;
            font-size: 15px;
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.12);
        }
        /* 缩略图容器 */
        .game-screenshot {
            margin-top: 36px;
            max-width: 600px;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .game-screenshot img {
            flex: 1;
            min-width: 140px;
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #333;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .game-screenshot img:hover {
            transform: scale(1.04) translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
            border-color: rgba(64, 158, 255, 0.35);
        }
        /* 图片放大弹窗 */
        .img-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.86);
            backdrop-filter: blur(8px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .img-modal.show {
            display: flex;
        }
        .modal-close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 36px;
            color: #fff;
            cursor: pointer;
            z-index: 10;
            user-select: none;
            transition: all 0.2s;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }
        .modal-close:hover {
            background: rgba(245, 108, 108, 0.25);
            transform: rotate(90deg);
        }
        .modal-prev, .modal-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 44px;
            color: #fff;
            cursor: pointer;
            padding: 12px 18px;
            user-select: none;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            transition: all 0.2s;
        }
        .modal-prev:hover, .modal-next:hover {
            background: rgba(64, 158, 255, 0.25);
            border-color: rgba(64, 158, 255, 0.4);
        }
        .modal-prev {
            left: 30px;
        }
        .modal-next {
            right: 30px;
        }
        .modal-img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.45);
        }
        /* 移动端适配 */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
                overflow: auto;
            }
            .sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
                max-height: unset;
            }
            .main {
                padding: 20px;
                max-height: unset;
            }
            .game-title {
                font-size: 32px;
            }
            .top-right {
                position: static;
                margin-bottom: 20px;
                display: inline-block;
            }
            .cursor-glow, .particles {
                display: none;
            }
            .game-bg {
                filter: blur(40px) brightness(0.32) saturate(0.85);
            }
        }
    </style>
</head>
<body>

    <!-- 右侧游戏详情 -->
    <div class="main">
        <div class="top-right glow-border">
            <span>💬 开心俱乐部 Q群：855901919</span>
        </div>
        <h1 class="game-title" id="gameTitle">仗剑传说</h1>
        <div class="game-intro" id="gameIntro"></div>
        <div class="btn-wrap">
            <a target="_blank" class="download-btn" id="downloadBtn">点击下载游戏</a>
            <a target="_blank" class="reg-btn" id="regBtn">账号注册</a>
            <div class="invite-box">邀请码：<span id="codeText"></span></div>
        </div>

    <!-- 图片放大弹窗 -->
    <div class="img-modal" id="imgModal">
        <span class="modal-close" id="modalClose">×</span>
        <button class="modal-prev" id="modalPrev">‹</button>
        <img src="" alt="放大图片" class="modal-img" id="modalImg">
        <button class="modal-next" id="modalNext">›</button>
    </div>
    <script>
        const downloadBtn = document.getElementById('downloadBtn');
        const regBtn = document.getElementById('regBtn');
